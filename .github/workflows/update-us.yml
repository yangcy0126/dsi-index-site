name: Update US WDSI Data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-us.yml"
      - "scripts/**"
      - "requirements.txt"
  schedule:
    - cron: "35 15 * * *"
  workflow_dispatch:

concurrency:
  group: update-wdsi-us-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-us:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Install browser fallback
        run: |
          python -m pip install playwright
          python -m playwright install chromium

      - name: Check API secret
        run: |
          if [ -z "${WDSI_API_KEY}" ] && [ -z "${OPENAI_API_KEY}" ]; then
            echo "WDSI_API_KEY or OPENAI_API_KEY secret is missing."
            exit 1
          fi
        env:
          WDSI_API_KEY: ${{ secrets.WDSI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Update records (standard)
        run: |
          python -u scripts/update_wdsi_records.py \
            --countries US \
            --lookback-days 90 \
            --max-pages 40 \
            --history-backfill-rounds 0 \
            --skip-build
        env:
          WDSI_API_KEY: ${{ secrets.WDSI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WDSI_API_BASE_URL: ${{ vars.WDSI_API_BASE_URL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          WDSI_MODEL: ${{ vars.WDSI_MODEL }}
          WDSI_OPENAI_MODEL: ${{ vars.WDSI_OPENAI_MODEL }}
          WDSI_REASONING_EFFORT: ${{ vars.WDSI_REASONING_EFFORT }}

      - name: Upload country record checkpoint
        uses: actions/upload-artifact@v4
        with:
          name: records-US
          path: records/US.csv
          if-no-files-found: error
          overwrite: true

      - name: Update records (extra history backfill)
        continue-on-error: true
        run: |
          python -u scripts/update_wdsi_records.py \
            --countries US \
            --lookback-days 1 \
            --max-pages 90 \
            --history-backfill-rounds 1 \
            --history-only \
            --skip-build
        env:
          WDSI_API_KEY: ${{ secrets.WDSI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WDSI_API_BASE_URL: ${{ vars.WDSI_API_BASE_URL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          WDSI_MODEL: ${{ vars.WDSI_MODEL }}
          WDSI_OPENAI_MODEL: ${{ vars.WDSI_OPENAI_MODEL }}
          WDSI_REASONING_EFFORT: ${{ vars.WDSI_REASONING_EFFORT }}

      - name: Upload post-extra checkpoint
        uses: actions/upload-artifact@v4
        with:
          name: records-US
          path: records/US.csv
          if-no-files-found: error
          overwrite: true

      - name: Update records (second extra history backfill)
        continue-on-error: true
        run: |
          python -u scripts/update_wdsi_records.py \
            --countries US \
            --lookback-days 1 \
            --max-pages 90 \
            --history-backfill-rounds 1 \
            --history-only \
            --skip-build
        env:
          WDSI_API_KEY: ${{ secrets.WDSI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WDSI_API_BASE_URL: ${{ vars.WDSI_API_BASE_URL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          WDSI_MODEL: ${{ vars.WDSI_MODEL }}
          WDSI_OPENAI_MODEL: ${{ vars.WDSI_OPENAI_MODEL }}
          WDSI_REASONING_EFFORT: ${{ vars.WDSI_REASONING_EFFORT }}

      - name: Upload post-second-extra checkpoint
        uses: actions/upload-artifact@v4
