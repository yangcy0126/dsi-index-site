          path: records/US.csv
          if-no-files-found: error
          overwrite: true

      - name: Update records (eighth extra history backfill)
        continue-on-error: true
        run: |
          python -u scripts/update_wdsi_records.py \
            --countries US \
            --lookback-days 1 \
            --max-pages 90 \
            --history-backfill-rounds 1 \
            --history-only \
            --skip-build
        env:
          WDSI_API_KEY: ${{ secrets.WDSI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WDSI_API_BASE_URL: ${{ vars.WDSI_API_BASE_URL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          WDSI_MODEL: ${{ vars.WDSI_MODEL }}
          WDSI_OPENAI_MODEL: ${{ vars.WDSI_OPENAI_MODEL }}
          WDSI_REASONING_EFFORT: ${{ vars.WDSI_REASONING_EFFORT }}

      - name: Upload post-eighth-extra checkpoint
        uses: actions/upload-artifact@v4
        with:
          name: records-US
          path: records/US.csv
          if-no-files-found: error
          overwrite: true

      - name: Update records (ninth extra history backfill)
        continue-on-error: true
        run: |
          python -u scripts/update_wdsi_records.py \
            --countries US \
            --lookback-days 1 \
            --max-pages 90 \
            --history-backfill-rounds 1 \
            --history-only \
            --skip-build
        env:
          WDSI_API_KEY: ${{ secrets.WDSI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WDSI_API_BASE_URL: ${{ vars.WDSI_API_BASE_URL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          WDSI_MODEL: ${{ vars.WDSI_MODEL }}
          WDSI_OPENAI_MODEL: ${{ vars.WDSI_OPENAI_MODEL }}
          WDSI_REASONING_EFFORT: ${{ vars.WDSI_REASONING_EFFORT }}

      - name: Upload country record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: records-US
          path: records/US.csv
          if-no-files-found: error
          overwrite: true

  finalize:
    runs-on: ubuntu-latest
    needs: update-us
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Download US record
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: records-US
          path: records

      - name: Rebuild site data
        run: python scripts/build_wdsi_data.py

      - name: Check method lock
        run: python scripts/check_method_lock.py

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No US data changes detected."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add records/US.csv data
            git commit -m "Update US WDSI data"
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push; then
                exit 0
              fi
              git rebase --abort || true
              echo "Push attempt ${attempt} failed; retrying..."
              sleep 5
            done
            echo "Failed to push rebuilt US data after 3 attempts."
            exit 1
          fi
