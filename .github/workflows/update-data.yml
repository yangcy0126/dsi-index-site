name: Update WDSI Data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-data.yml"
      - "scripts/**"
      - "requirements.txt"
  schedule:
    - cron: "20 15 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check API secret
        run: |
          if [ -z "${WDSI_API_KEY}" ] && [ -z "${OPENAI_API_KEY}" ]; then
            echo "WDSI_API_KEY or OPENAI_API_KEY secret is missing."
            exit 1
          fi
        env:
          WDSI_API_KEY: ${{ secrets.WDSI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Update records and rebuild data
        run: python scripts/update_wdsi_records.py --countries CN,US --lookback-days 200 --max-pages 40
        env:
          WDSI_API_KEY: ${{ secrets.WDSI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WDSI_API_BASE_URL: ${{ vars.WDSI_API_BASE_URL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          WDSI_MODEL: ${{ vars.WDSI_MODEL }}
          WDSI_OPENAI_MODEL: ${{ vars.WDSI_OPENAI_MODEL }}
          WDSI_REASONING_EFFORT: ${{ vars.WDSI_REASONING_EFFORT }}

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No data changes detected."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add records data
            git commit -m "Update WDSI data"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
