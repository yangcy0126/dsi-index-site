name: Update WDSI Data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-data.yml"
      - "scripts/**"
      - "requirements.txt"
  schedule:
    - cron: "20 15 * * *"
  workflow_dispatch:

concurrency:
  group: update-wdsi-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-country:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.country == 'RU' && 45 || matrix.country == 'IN' && 90 || 70 }}
    strategy:
      fail-fast: false
      matrix:
        country: [CN, US, UK, JP, KR, DE, IN, FR, RU]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Install browser fallback
        if: matrix.country == 'JP' || matrix.country == 'UK' || matrix.country == 'RU'
        run: |
          python -m pip install playwright
          python -m playwright install chromium

      - name: Check API secret
        run: |
          if [ -z "${WDSI_API_KEY}" ] && [ -z "${OPENAI_API_KEY}" ]; then
            echo "WDSI_API_KEY or OPENAI_API_KEY secret is missing."
            exit 1
          fi
        env:
          WDSI_API_KEY: ${{ secrets.WDSI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Update records (standard)
        if: matrix.country != 'RU' && matrix.country != 'IN'
        run: python scripts/update_wdsi_records.py --countries ${{ matrix.country }} --lookback-days 200 --max-pages 90 --skip-build
        env:
          WDSI_API_KEY: ${{ secrets.WDSI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WDSI_API_BASE_URL: ${{ vars.WDSI_API_BASE_URL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          WDSI_MODEL: ${{ vars.WDSI_MODEL }}
          WDSI_OPENAI_MODEL: ${{ vars.WDSI_OPENAI_MODEL }}
          WDSI_REASONING_EFFORT: ${{ vars.WDSI_REASONING_EFFORT }}

      - name: Update records (India recent bootstrap)
        if: matrix.country == 'IN'
        run: python scripts/update_wdsi_records.py --countries IN --lookback-days 20 --max-pages 30 --skip-build
        env:
          WDSI_API_KEY: ${{ secrets.WDSI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WDSI_API_BASE_URL: ${{ vars.WDSI_API_BASE_URL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          WDSI_MODEL: ${{ vars.WDSI_MODEL }}
          WDSI_OPENAI_MODEL: ${{ vars.WDSI_OPENAI_MODEL }}
          WDSI_REASONING_EFFORT: ${{ vars.WDSI_REASONING_EFFORT }}

      - name: Update records (headed browser for RU)
        if: matrix.country == 'RU'
        run: xvfb-run -a python scripts/update_wdsi_records.py --countries ${{ matrix.country }} --lookback-days 200 --max-pages 90 --skip-build
        env:
          WDSI_API_KEY: ${{ secrets.WDSI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WDSI_API_BASE_URL: ${{ vars.WDSI_API_BASE_URL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          WDSI_MODEL: ${{ vars.WDSI_MODEL }}
          WDSI_OPENAI_MODEL: ${{ vars.WDSI_OPENAI_MODEL }}
          WDSI_REASONING_EFFORT: ${{ vars.WDSI_REASONING_EFFORT }}
          WDSI_PLAYWRIGHT_HEADLESS: "0"

      - name: Upload country record
        uses: actions/upload-artifact@v4
        with:
          name: records-${{ matrix.country }}
          path: records/${{ matrix.country }}.csv
          if-no-files-found: error

  finalize:
    runs-on: ubuntu-latest
    needs: update-country
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Download CN record
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: records-CN
          path: records

      - name: Download US record
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: records-US
          path: records

      - name: Download UK record
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: records-UK
          path: records

      - name: Download JP record
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: records-JP
          path: records

      - name: Download KR record
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: records-KR
          path: records

      - name: Download DE record
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: records-DE
          path: records

      - name: Download IN record
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: records-IN
          path: records

      - name: Download FR record
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: records-FR
          path: records

      - name: Download RU record
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: records-RU
          path: records

      - name: Rebuild site data
        run: python scripts/build_wdsi_data.py

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No data changes detected."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add records data
            git commit -m "Update WDSI data"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
