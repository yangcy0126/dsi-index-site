name: Update WDSI Data

on:
  schedule:
    - cron: "20 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check OpenAI secret
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY secret is missing."
            exit 1
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Update records and rebuild data
        run: python scripts/update_wdsi_records.py --countries CN,US
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WDSI_OPENAI_MODEL: ${{ vars.WDSI_OPENAI_MODEL }}
          WDSI_REASONING_EFFORT: ${{ vars.WDSI_REASONING_EFFORT }}

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No data changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add records data
          git commit -m "Update WDSI data"
          git push
